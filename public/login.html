<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="./assets/styles/login.css" />
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon">
    <title>Obsidiana | Login</title>
  </head>
  <body>
    <main>
      <img src="./assets/logo.png" alt="Logo Obsidiana">

      <form>
        <label>
          <span>E-mail</span>

          <div class="label-group">
            <input id="email" placeholder="fulano@email.com" />
            <div><img src="./assets/icons/email.svg" alt="Ícone de e-mail"></div>
          </div>
        </label>

        <label>
          <span>Senha</span>

          <div class="label-group">
            <input id="senha" type="password" placeholder="••••••••••••" />
            <div><img src="./assets/icons/cadeado.svg" alt="Ícone de cadeado"></div>
          </div>
        </label>

        <a href="#">Esqueceu sua senha?</a>
        
        <button>Entrar</button>
        <button>
          <img src="./assets/icons/google.svg" alt="Ícone do Google" />
          Entrar com o Google
        </button>
      </form>

      <a href="cadastro.html">Não tem conta? Cadastre-se</a>
    </main>

    <section>
      <div></div>
    </section>
  </body>
</html>
