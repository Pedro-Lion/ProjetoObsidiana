<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width" />
  <title>Obsidiana | Cadastro</title>
</head>
<body>
  <main>
    <h1>Cadastro</h1>
    <form>
      <label>
        <span>Nome completo</span>
        <input id="input_email" placeholder="exemplo@email.com" />
      </label>

      <label>
        <span>E-mail</span>
        <input id="input_email" placeholder="exemplo@email.com" />
      </label>

      <div>
        <label>
          <span>Senha</span>
          <input id="input_senha" type="password" placeholder="•••••" />
        </label>
        
        <label>
          <span>Confirmar senha</span>
          <input id="input_confirmar_senha" type="password" placeholder="•••••" />
        </label>
      </div>

      <button>Cadastrar</button>

      <button>
        <img src="./assets/images/google_icon.svg" alt="Ícone do Google">
        Entrar com o Google
      </button>
    </form>
    
    <a href="login.html">Já tem conta? Faça login</a>
  </main>
</body>
</html>
