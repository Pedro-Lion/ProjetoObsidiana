server.port=8081
spring.application.name=auth-microservice

# H2 em memória igual ao backend principal
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Deixa o Hibernate criar a tabela ? sem validaçăo
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Console H2 para debug (opcional)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console