server.port=8081
spring.application.name=auth-microservice

# Importando .env
spring.config.import=optional:file:.env[.properties]

## Configuração banco de dados - H2
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Deixa o Hibernate criar a tabela sem validação (NÃO DEVE SER USADO COM MYSQL)
spring.jpa.hibernate.ddl-auto=create-drop

