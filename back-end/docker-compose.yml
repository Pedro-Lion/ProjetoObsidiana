services:
  mysql:
    container_name: mysql
    image: mysql:8
    restart: always
    env_file: ".env"
    entrypoint: >
      bash -c "chmod 644 /etc/mysql/conf.d/custom.cnf && 
               docker-entrypoint.sh mysqld"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./configs-mysql/obsidiana.sql:/docker-entrypoint-initdb.d/init.sql
      - ./configs-mysql/custom.cnf:/etc/mysql/conf.d/custom.cnf
    ports:
      - 3306:3306

volumes:
  mysql_data:
  