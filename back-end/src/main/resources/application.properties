# Importando .env
spring.config.import=optional:file:.env[.properties]

# URL do Front-end para incluir no CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}

## Configuracao do banco de dados - H2
#spring.datasource.url=jdbc:h2:mem:testedb
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
## Criar e popular as tabelas automaticamente (NÃƒO DEVE SER USADO COM MYSQL)
#spring.jpa.hibernate.ddl-auto=update

# Configuracao banco de dados - MYSQL
spring.datasource.url=jdbc:mysql://${MYSQL_URL:localhost}:3306/${MYSQL_DATABASE}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
# Validar se as tabelas correspondem Ã s classes model e vice-versa
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true

# Configuracao da chave
# api.security.token.secret=my-secret-key
api.security.token.secret=${JWT_SECRET:my-secret-key-my-secret-key-12345}

# Configuracao das imagens
upload.dir = upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

#DEBUGs
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerAdapter=DEBUG
logging.level.org.springframework.boot.autoconfigure.web=DEBUG

# Para ver as excessoes de validacao
auth.microservice.url=${AUTH_MICROSERVICE_URL:http://localhost:8081}

# Niveis de log
logging.level.com.example.crudObsidiana=DEBUG
logging.level.AUDIT=INFO
logging.level.SECURITY=WARN

# Arquivos de log separados
logging.file.name=logs/application.log
logging.file.path=logs

# Formato com timestamp
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ROTAÃƒÂ‡ÃƒÂƒO de logs
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.max-file-size=10MB

# Para ver as excessoes de validacao
logging.level.org.springframework.validation=DEBUG

# Habilitar access log do Tomcat (Util para ver status HTTP)
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b
server.tomcat.accesslog.directory=logs
server.tomcat.accesslog.file-date-format=.yyyy-MM-dd

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:myuser}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:secret}

# Nomes da fila (centralizados aqui para nÃ£o duplicar strings no cÃ³digo)
orcamento.rabbitmq.exchange=orcamento.exchange
orcamento.rabbitmq.queue=orcamento.status.queue
orcamento.rabbitmq.routing-key=orcamento.status

# ============================================================
# CACHE ? adicionar ao final do application.properties existente
# ============================================================

# Tipo de cache: simple = in-memory nativo do Spring (sem Redis)
spring.cache.type=simple

# Mostra no console quando o cache é consultado (HIT/MISS/PUT)
logging.level.org.springframework.cache=TRACE

