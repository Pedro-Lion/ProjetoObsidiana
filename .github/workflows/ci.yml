name: CI #NOME DA A횉횄O

on:
  push: #EVENTO QUE IR횁 DISPARAR A A횉횄O
    branches:
      - main #BRANCH QUE IR횁 DISPARAR A A횉횄O

  pull_request: #Executa quando algu챕m abre PR para a branch principal
    branches:
      - main

jobs: #TRABALHOS A SEREM EXECUTADOS

  build: #NOME DO TRABALHO, PODE SER QUALQUER UM

    runs-on: ubuntu-latest #OS A SER UTILIZADO

    steps: #PASSOS A SEREM EXECUTADOS

      - name: Baixar c처digo #NOME DO PASSO, NESSE CASO, CLONAR O REPOSITORIO
        uses: actions/checkout@v4 #ACTION ESCOLHIDA PARA CLONAR O REPOSITORIO

      - name: Instalar Node
        uses: actions/setup-node@v4
        with: #CONFIGURA횉횛ES DA ACTION
          node-version: 20 #VERS횄O DO NODE

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' #DISTRIBUI횉횄O DO JDK
          java-version: '17'
        
      # - name: Build with Maven #BUILDAR COM MAVEN
      #   run: mvn -B package -DskipTests

      - name: Instalar depend챗ncias
        run: npm install

      - name: Rodar testes
        run: npm test

      - name: Build
        run: npm run build